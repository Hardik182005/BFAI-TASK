<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dvBg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C3FF5"/>
      <stop offset="0.55" stop-color="#5317DD"/>
      <stop offset="1" stop-color="#3A0CA3"/>
    </linearGradient>
    <linearGradient id="dvDoc" x1="150" y1="120" x2="362" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9E1FF"/>
    </linearGradient>
    <linearGradient id="dvDial" x1="190" y1="230" x2="322" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6C3FF5"/>
      <stop offset="1" stop-color="#5317DD"/>
    </linearGradient>
    <filter id="dvShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1E0060" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#dvBg)"/>
  <!-- subtle top sheen -->
  <rect x="16" y="16" width="480" height="240" rx="116" fill="#FFFFFF" opacity="0.06"/>

  <!-- Document body (the "doc") -->
  <g filter="url(#dvShadow)">
    <path d="M168 112h128l72 72v216a24 24 0 0 1-24 24H168a24 24 0 0 1-24-24V136a24 24 0 0 1 24-24z" fill="url(#dvDoc)"/>
    <!-- folded corner -->
    <path d="M296 112l72 72h-56a16 16 0 0 1-16-16v-56z" fill="#CBBEFF"/>
  </g>

  <!-- Vault dial (the "vault") centered on the document -->
  <circle cx="256" cy="300" r="74" fill="url(#dvDial)"/>
  <circle cx="256" cy="300" r="74" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="6"/>
  <circle cx="256" cy="300" r="40" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-opacity="0.95"/>
  <!-- dial spokes -->
  <g stroke="#FFFFFF" stroke-width="12" stroke-linecap="round">
    <line x1="256" y1="232" x2="256" y2="210"/>
    <line x1="256" y1="390" x2="256" y2="368"/>
    <line x1="188" y1="300" x2="210" y2="300"/>
    <line x1="324" y1="300" x2="302" y2="300"/>
  </g>
  <circle cx="256" cy="300" r="12" fill="#FFFFFF"/>

  <!-- text lines above the dial (document content) -->
  <g fill="#5317DD" opacity="0.55">
    <rect x="186" y="168" width="140" height="16" rx="8"/>
    <rect x="186" y="198" width="96" height="16" rx="8"/>
  </g>
</svg>
